<div class="home-container">
    <header class="app-header">
        <h1 class="mat-h1">Posmixto</h1>
        <p class="subtitle mat-body-medium">Kit de anotadores</p>
    </header>

    <main class="content">
        <div class="games-grid">
            <mat-card class="game-card" appearance="outlined">
                <mat-card-header>
                    <mat-icon mat-card-avatar color="primary">casino</mat-icon>
                    <mat-card-title>Generala</mat-card-title>
                    <mat-card-subtitle>Anotador clásico</mat-card-subtitle>
                </mat-card-header>
                <mat-card-content>
                    <p class="mat-body-2" style="margin-top: 1rem; color: var(--text-muted);">
                        Anotador automatico del clasico juego de dados para jugar con les pibis despues de un fulbito
                        del amor 💕
                    </p>
                </mat-card-content>
                <mat-card-actions align="end">
                    <button mat-flat-button color="primary" routerLink="/generala">
                        JUGAR
                    </button>
                </mat-card-actions>
            </mat-card>
        </div>
    </main>
</div>
