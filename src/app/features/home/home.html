<header class="bg-card border-b border-border shadow-sm p-4 flex items-center z-10 shrink-0">
    <h1>Toolkit</h1>
</header>
<div class="grid grid-cols-2 gap-4 p-4">
    <section hlmCard>
        <div hlmCardHeader class="flex flex-col items-center gap-4">
            <ng-icon hlm name="lucideDices" size="xl" class="text-primary"></ng-icon>
            <h3 hlmCardTitle>Generala</h3>
        </div>
        <div hlmCardFooter class="flex justify-center">
            <button hlmBtn variant="outline" class="w-full" routerLink="/generala">
                Jugar
            </button>
        </div>
    </section>
    <section hlmCard>
        <div hlmCardHeader class="flex flex-col items-center gap-4">
            <ng-icon hlm name="lucideUsers" size="xl" class="text-primary"></ng-icon>
            <h3 hlmCardTitle>Equipos</h3>
        </div>
        <div hlmCardFooter class="justify-center">
            <button hlmBtn variant="outline" class="w-full" (click)="openTeamBuilderDialog()">
                Armar
            </button>
        </div>
    </section>
</div>
