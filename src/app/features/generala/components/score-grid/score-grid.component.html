<div class="h-full flex flex-col pt-4">
    @if (gameState(); as state) {
    <div
        class="flex-1 w-full overflow-x-auto overflow-y-auto border border-border rounded-xl bg-card text-card-foreground">
        <table class="w-full text-sm border-collapse">
            <thead class="bg-muted/50 sticky top-0 z-20">
                <tr>
                    <th class="sticky left-0 bg-muted/50 z-30 font-medium text-left p-3 border-b border-r w-36">
                        Juego</th>
                    @for (player of players(); track player.id) {
                    <th class="font-medium p-3 border-b text-center min-w-[75px]">
                        <div class="truncate w-full">{{ player.name }}</div>
                        <!-- <div class="text-xs text-muted-foreground font-normal mt-0.5">{{ getPlayerTotal(player.id) }} pts</div> -->
                    </th>
                    }
                </tr>
            </thead>
            <tbody class="divide-y divide-border">
                <!-- Categories -->
                @for (cat of categories; track cat) {
                <tr class="hover:bg-muted/30 transition-colors">
                    <td class="sticky left-0 bg-card z-10 font-medium text-left p-3 border-r whitespace-nowrap">{{
                        getLabel(cat) }}</td>
                    @for (player of players(); track player.id) {
                    <td class="p-0 align-middle text-center relative border-l first:border-l-0">
                        <app-score-cell [playerId]="player.id" [category]="cat" [scores]="state.scores[player.id]" />
                    </td>
                    }
                </tr>
                }
            </tbody>
            <tfoot class="bg-muted/50 sticky bottom-0 z-20">
                <tr>
                    <th class="sticky left-0 bg-muted/50 z-30 font-medium text-left p-3 border-t border-r">Total</th>
                    @for (player of players(); track player.id) {
                    <th class="font-bold p-3 border-t text-center">{{ getPlayerTotal(player.id) }}</th>
                    }
                </tr>
            </tfoot>
        </table>
    </div>
    }
</div>
