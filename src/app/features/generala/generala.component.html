<div class="flex flex-col h-full bg-background text-foreground">
    <header class="flex items-center p-4 border-b bg-card">
        <button hlmBtn variant="ghost" size="icon" routerLink="/" aria-label="Volver a Inicio">
            <ng-icon name="lucideArrowLeft"></ng-icon>
        </button>
        <h1 class="text-xl font-semibold tracking-tight ml-4 flex-1">Anotador de Generala</h1>
        @if (isGameActive()) {
        <button hlmBtn variant="ghost" size="icon" (click)="resetGame()" aria-label="Nueva Partida"
            class="text-muted-foreground hover:text-foreground">
            <ng-icon name="lucideRotateCcw"></ng-icon>
        </button>
        }
    </header>

    <main class="flex-1 overflow-y-auto p-4">
        @if (!isGameActive()) {
        <div class="flex flex-col max-w-md mx-auto h-full pt-8">
            <p class="text-muted-foreground text-center mb-8">Agrega a los jugadores para comenzar la partida.</p>

            <app-player-input [(players)]="setupPlayers" />

            <div class="mt-auto pt-8 pb-4">
                <button hlmBtn variant="default" class="w-full h-12 text-base" [disabled]="setupPlayers.length === 0"
                    (click)="startGame(setupPlayers)">
                    Comenzar partida
                </button>
            </div>
        </div>
        } @else {
        <div class="flex flex-col h-full animate-in fade-in duration-500">

            <app-score-grid />

            <div class="mt-6 p-6 border border-primary/20 bg-primary/5 rounded-xl text-center"
                *ngIf="stateService.gameState()?.isFinished">
                <h2 class="text-2xl font-bold text-primary mb-2">¡Partida Finalizada!</h2>
                <p class="text-muted-foreground">Revisa la tabla de puntajes arriba para ver al ganador.</p>
            </div>

        </div>
        }
    </main>
</div>
