<div class="min-h-screen flex flex-col">
    <header class="bg-card border-b border-border shadow-sm p-4 flex items-center z-10">
        <button hlmBtn variant="ghost" size="icon" routerLink="/" aria-label="Volver a Inicio" class="mr-2 shrink-0">
            <ng-icon hlm name="lucideArrowLeft" size="sm"></ng-icon>
        </button>
        <h1 class="m-0 font-bold text-primary tracking-tight text-xl">Datos Recibidos</h1>
        <div class="flex-1"></div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
        <div class="max-w-[600px] mx-auto">
            <section hlmCard>
                <div hlmCardHeader>
                    <h3 hlmCardTitle>Se ha recibido texto compartido</h3>
                    <p hlmCardDescription>Desde WhatsApp u otra app</p>
                </div>
                <div hlmCardContent class="mt-4">
                    @if (parseError()) {
                    <p class="text-destructive font-medium">
                        {{ parseError() }}
                    </p>
                    @if (sharedText()) {
                    <details class="mt-4 text-muted-foreground">
                        <summary>Ver texto recibido</summary>
                        <pre class="bg-secondary p-4 rounded-md whitespace-pre-wrap font-mono text-xs mt-2">{{ sharedText() }}</pre>
                    </details>
                    }
                    } @else {
                    <div class="flex flex-col items-center justify-center p-8 gap-4">
                        <ng-icon hlm name="lucideUsers" size="xl" class="text-primary w-12 h-12"></ng-icon>
                        <p class="text-base font-medium">Atrapando el pase de WhatsApp...</p>
                    </div>
                    }
                </div>
                <div hlmCardFooter class="justify-end">
                    <button hlmBtn variant="default" routerLink="/">
                        IR AL INICIO
                    </button>
                </div>
            </section>
        </div>
    </main>
</div>
