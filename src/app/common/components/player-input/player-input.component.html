<div class="player-input-container">
    <h3 class="mat-h3">Jugadores</h3>

    <div class="input-group">
        <mat-form-field appearance="outline" class="player-input-field">
            <mat-label>Nombre del jugador</mat-label>
            <input matInput [formControl]="playerNameControl" (keyup.enter)="addPlayer()" />
        </mat-form-field>
        <button mat-fab extended color="primary" (click)="addPlayer()" [disabled]="!playerNameControl.value?.trim()">
            <mat-icon>add</mat-icon> AGREGAR
        </button>
    </div>

    <mat-list class="players-list">
        @for (player of players(); track player.id) {
        <mat-list-item>
            <span matListItemTitle>{{ player.name }}</span>
            <button mat-icon-button color="warn" matListItemMeta (click)="removePlayer(player.id)"
                aria-label="Eliminar jugador">
                <mat-icon>close</mat-icon>
            </button>
        </mat-list-item>
        } @empty {
        <p class="empty-state mat-body-2">No hay jugadores. Agrega al menos uno para comenzar.</p>
        }
    </mat-list>
</div>
