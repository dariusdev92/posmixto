<div class="player-input-container">
    <h3>Jugadores</h3>

    <div class="input-group">
        <input type="text" [formControl]="playerNameControl" placeholder="Nombre del jugador"
            (keyup.enter)="addPlayer()" />
        <button class="btn btn-primary" (click)="addPlayer()" [disabled]="!playerNameControl.value?.trim()">
            Agregar
        </button>
    </div>

    <ul class="players-list">
        @for (player of players(); track player.id) {
        <li class="player-item">
            <span>{{ player.name }}</span>
            <button class="btn-icon" (click)="removePlayer(player.id)" aria-label="Eliminar jugador">
                ✕
            </button>
        </li>
        } @empty {
        <li class="empty-state">No hay jugadores. Agrega al menos uno para comenzar.</li>
        }
    </ul>
</div>
