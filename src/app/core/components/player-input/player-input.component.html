<div class="player-input-container">
    <h3 class="text-lg font-medium tracking-tight mb-4">Jugadores</h3>

    <div class="flex items-end gap-2 mb-6">
        <label hlmLabel class="flex-1">
            Nombre del jugador
            <input hlmInput class="w-full mt-1.5" [formControl]="playerNameControl" (keyup.enter)="addPlayer()" />
        </label>
        <button hlmBtn (click)="addPlayer()" [disabled]="!playerNameControl.value?.trim()">
            <ng-icon name="lucidePlus"></ng-icon> Agregar
        </button>
    </div>

    <div class="flex flex-col gap-2">
        @for (player of players(); track player.id) {
        <div class="flex items-center justify-between p-3 border rounded-lg bg-card text-card-foreground">
            <span class="text-sm font-medium">{{ player.name }}</span>
            <button hlmBtn variant="ghost" size="icon"
                class="text-destructive hover:bg-destructive/10 hover:text-destructive"
                (click)="removePlayer(player.id)" aria-label="Eliminar jugador">
                <ng-icon name="lucideX"></ng-icon>
            </button>
        </div>
        } @empty {
        <p class="text-sm text-muted-foreground italic p-4 text-center border border-dashed rounded-lg">No hay
            jugadores. Agrega al menos uno para comenzar.</p>
        }
    </div>
</div>
